services:
  postgres:
    image: postgres:16-alpine
    container_name: moneymovement-postgres
    environment:
      POSTGRES_DB: moneymovement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - moneymovement-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  moneymovement-pgdata:
